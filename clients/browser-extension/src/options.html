<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HIP Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="settings-shell">
    <header>
      <h1>HIP Settings</h1>
      <p>Configure local HIP API access and privacy-safe scan behavior.</p>
      <p id="pluginVersion" class="status">HIP Plugin loading</p>
    </header>

    <form id="settingsForm">
      <label>HIP API base URL
        <input id="apiBaseUrl" type="url" required>
      </label>

      <label>HIP Web base URL
        <input id="webBaseUrl" type="url" required>
      </label>

      <label>Scan mode
        <select id="scanMode">
          <option>Quiet</option>
          <option>Normal</option>
          <option>Strict</option>
          <option>Paranoid</option>
        </select>
      </label>

      <label>Banner display mode
        <select id="bannerDisplayMode">
          <option>WarningsOnly</option>
          <option>DangerousOnly</option>
          <option>AlwaysShow</option>
          <option>NeverShow</option>
        </select>
      </label>

      <section class="settings-section" aria-labelledby="scanBehaviorHeading">
        <h2 id="scanBehaviorHeading">Scan behavior</h2>

        <label class="switch-row">
          <span>Enable link badges</span>
          <input id="enableLinkBadges" type="checkbox" role="switch">
        </label>

        <label class="switch-row">
          <span>Enable link scanning</span>
          <input id="enableLinkScanning" type="checkbox" role="switch">
        </label>

        <label class="switch-row">
          <span>Enable warning banner</span>
          <input id="enableWarningBanner" type="checkbox" role="switch">
        </label>

        <label class="switch-row">
          <span>Enable safety page routing</span>
          <input id="enableSafetyRouting" type="checkbox" role="switch">
        </label>

        <label class="switch-row">
          <span>Submit privacy-safe scan results</span>
          <input id="submitScanResults" type="checkbox" role="switch">
        </label>
      </section>

      <section class="settings-section" aria-labelledby="providerHeading">
        <div class="section-heading">
          <div>
            <h2 id="providerHeading">External evidence providers</h2>
            <p>Server-enforced provider settings. HIP still decides final scoring.</p>
          </div>
          <button id="refreshProviders" class="secondary-button" type="button">Refresh</button>
        </div>

        <label class="switch-row">
          <span>Allow external providers</span>
          <input id="externalProvidersEnabled" type="checkbox" role="switch">
        </label>

        <label class="switch-row provider-row">
          <span>
            SSL Labs / Qualys TLS
            <small>Domain-only TLS evidence. Enabled for MVP testing.</small>
          </span>
          <input id="sslLabsEnabled" type="checkbox" role="switch">
        </label>

        <label class="switch-row provider-row">
          <span>
            Google Web Risk / Safe Browsing
            <small>Disabled until credentials and adapter setup are configured.</small>
          </span>
          <input id="googleWebRiskEnabled" type="checkbox" role="switch">
        </label>

        <label class="switch-row provider-row">
          <span>
            VirusTotal
            <small>Disabled until credentials and adapter setup are configured.</small>
          </span>
          <input id="virusTotalEnabled" type="checkbox" role="switch">
        </label>

        <p id="providerStatus" class="status muted-status">Provider settings not checked yet.</p>
      </section>

      <div class="button-row">
        <button type="submit">Save Settings</button>
        <button id="restoreDefaults" type="button">Restore Defaults</button>
      </div>

      <p id="status" class="status"></p>
    </form>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
