<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HIP Mail Bridge</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; width: 320px; }
    label { display:block; margin-top:8px; font-size:12px; }
    input { width: 100%; padding: 6px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 8px 10px; }
    .ok { color: #0a7b32; font-size: 12px; }
    .err { color: #b32727; font-size: 12px; }
  </style>
</head>
<body>
  <h3>HIP Mail Bridge</h3>

  <label>HIP API Base URL</label>
  <input id="baseUrl" placeholder="http://100.67.76.107:5101" />

  <label>Identity ID</label>
  <input id="identityId" placeholder="hip-system" />

  <label>Key ID</label>
  <input id="keyId" placeholder="hip-system" />

  <button id="saveBtn">Save</button>
  <div id="msg"></div>

  <script src="popup.js"></script>
</body>
</html>
